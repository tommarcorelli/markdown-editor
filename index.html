<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MD — éditeur markdown</title>
<link rel="stylesheet" href="css/editor.css">
<link rel="stylesheet" id="preview-theme" href="css/themes/github.css">
<link rel="stylesheet" href="css/print.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-left">
    <span class="logo">MD<span class="logo-dot">.</span></span>
    <input id="doc-title" class="doc-title" value="sans-titre" spellcheck="false">
  </div>

  <div class="topbar-center">
    <button class="mode-btn" data-mode="split" aria-pressed="true">Split</button>
    <button class="mode-btn" data-mode="edit" aria-pressed="false">Édition</button>
    <button class="mode-btn" data-mode="preview" aria-pressed="false">Aperçu</button>
  </div>

  <div class="topbar-right">
    <select id="theme-select" class="theme-select" aria-label="Thème de rendu">
      <option value="github">Github</option>
      <option value="minimal">Minimal</option>
      <option value="cyberpunk">Cyberpunk</option>
    </select>

    <div class="menu" id="file-menu">
      <button class="menu-trigger">Fichier ▾</button>
      <div class="menu-list">
        <button data-action="new">Nouveau</button>
        <button data-action="open">Ouvrir…</button>
        <button data-action="save">Enregistrer (.md)</button>
        <button data-action="export-html">Exporter en HTML</button>
        <button data-action="export-pdf">Exporter en PDF</button>
      </div>
    </div>
  </div>
</header>

<main class="workspace" data-mode="split">
  <section class="pane pane-editor">
    <textarea id="editor" spellcheck="false" placeholder="# Commence à écrire…"></textarea>
  </section>

  <div class="pane-resizer" id="resizer"></div>

  <section class="pane pane-preview">
    <div id="preview" class="markdown-body"></div>
  </section>
</main>

<footer class="statusbar">
  <span id="word-count">0 mots</span>
  <span id="char-count">0 caractères</span>
  <span id="save-status">Enregistré</span>
</footer>

<!-- Libs -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/markdown-it/14.1.0/markdown-it.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">

<!-- App -->
<script src="js/renderer.js"></script>
<script src="js/storage.js"></script>
<script src="js/themes.js"></script>
<script src="js/export.js"></script>
<script src="js/app.js"></script>
</body>
</html>
