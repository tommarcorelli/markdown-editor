<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MD — éditeur markdown</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="theme-color" content="#1a1d23">
<link rel="stylesheet" href="css/editor.css">
<link rel="stylesheet" href="css/themes/_base.css">
<link rel="stylesheet" id="preview-theme" href="css/themes/github.css">
<link rel="stylesheet" href="css/print.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-left">
    <span class="logo">MD<span class="logo-dot">.</span></span>
    <input id="doc-title" class="doc-title" value="sans-titre" spellcheck="false">
  </div>

  <div class="topbar-center">
    <button class="mode-btn" data-mode="split" aria-pressed="true" title="Vue partagée">
      <svg viewBox="0 0 16 16" width="14" height="14"><rect x="1" y="2" width="6" height="12" rx="1" fill="none" stroke="currentColor" stroke-width="1.4"/><rect x="9" y="2" width="6" height="12" rx="1" fill="currentColor" opacity="0.35"/></svg>
      Split
    </button>
    <button class="mode-btn" data-mode="edit" aria-pressed="false" title="Édition seule">
      <svg viewBox="0 0 16 16" width="14" height="14"><path d="M11 2l3 3-8 8-3.5 1L3.5 11l7.5-9z" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
      Édition
    </button>
    <button class="mode-btn" data-mode="preview" aria-pressed="false" title="Aperçu seul">
      <svg viewBox="0 0 16 16" width="14" height="14"><path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z" fill="none" stroke="currentColor" stroke-width="1.4"/><circle cx="8" cy="8" r="2" fill="currentColor"/></svg>
      Aperçu
    </button>
  </div>

  <div class="topbar-right">
    <div class="select-wrap">
      <select id="theme-select" class="theme-select" aria-label="Thème de rendu">
        <option value="github">Github</option>
        <option value="minimal">Minimal</option>
        <option value="academique">Académique</option>
        <option value="ardoise">Ardoise</option>
        <option value="kraft">Kraft</option>
        <option value="sepia">Sépia</option>
        <option value="corail">Corail</option>
        <option value="rose">Rosé</option>
        <option value="lavande">Lavande</option>
        <option value="solarized">Solarized</option>
        <option value="nord">Nord</option>
        <option value="foret">Forêt</option>
        <option value="encre">Encre</option>
        <option value="nuit">Nuit</option>
        <option value="dracula">Dracula</option>
        <option value="gruvbox">Gruvbox</option>
        <option value="monochrome">Monochrome</option>
        <option value="terminal">Terminal</option>
        <option value="synthwave">Synthwave</option>
        <option value="neobrutalist">Néobrutalist</option>
        <option value="cyberpunk">Cyberpunk</option>
      </select>
      <svg class="select-arrow" viewBox="0 0 10 6" width="10" height="6"><path d="M1 1l4 4 4-4" fill="none" stroke="currentColor" stroke-width="1.4"/></svg>
    </div>

    <div class="menu" id="options-menu">
      <button class="menu-trigger" title="Options d'affichage du document">
        <svg viewBox="0 0 16 16" width="13" height="13"><circle cx="8" cy="3" r="1.3" fill="currentColor"/><circle cx="8" cy="8" r="1.3" fill="currentColor"/><circle cx="8" cy="13" r="1.3" fill="currentColor"/></svg>
      </button>
      <div class="menu-list">
        <label class="menu-toggle">
          <input type="checkbox" id="toggle-toc">
          <span>Sommaire</span>
        </label>
        <label class="menu-toggle">
          <input type="checkbox" id="toggle-numbering">
          <span>Numéroter les sections</span>
        </label>
      </div>
    </div>

    <div class="menu" id="file-menu">
      <button class="menu-trigger">
        <svg viewBox="0 0 16 16" width="13" height="13"><path d="M2 3.5A1.5 1.5 0 013.5 2h3l1.5 1.5H12.5A1.5 1.5 0 0114 5v7.5A1.5 1.5 0 0112.5 14h-9A1.5 1.5 0 012 12.5v-9z" fill="none" stroke="currentColor" stroke-width="1.3"/></svg>
        Fichier
      </button>
      <div class="menu-list">
        <button data-action="new"><span class="mi">＋</span>Nouveau</button>
        <button data-action="open"><span class="mi">⤴</span>Ouvrir…</button>
        <div class="menu-sep"></div>
        <button data-action="save"><span class="mi">↓</span>Enregistrer (.md)</button>
        <button data-action="export-html"><span class="mi">↓</span>Exporter en HTML</button>
        <button data-action="export-pdf"><span class="mi">↓</span>Exporter en PDF (fidèle au thème)</button>
        <button data-action="export-pdf-vector"><span class="mi">↓</span>Exporter en PDF (texte sélectionnable)</button>
        <button data-action="print-pdf"><span class="mi">🖶</span>Imprimer (PDF navigateur)</button>
        <div class="menu-hint">"Fidèle au thème" = image, rendu exact. "Texte sélectionnable" = vectoriel léger, palette simplifiée.</div>
        <button data-action="export-slides"><span class="mi">▤</span>Exporter en présentation</button>
      </div>
    </div>
  </div>
</header>

<div class="toolbar" id="toolbar">
  <button data-cmd="bold" title="Gras (Ctrl+B)"><svg viewBox="0 0 16 16" width="14" height="14"><path d="M4 2h4.5a2.5 2.5 0 010 5H4V2zM4 7h5a2.5 2.5 0 010 5H4V7z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg></button>
  <button data-cmd="italic" title="Italique (Ctrl+I)"><svg viewBox="0 0 16 16" width="14" height="14"><path d="M7 2h5M4 14h5M9.5 2L6.5 14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></button>
  <button data-cmd="strike" title="Barré"><svg viewBox="0 0 16 16" width="14" height="14"><path d="M4 8h8M6 4.5c0-1 1-2 2-2s2.5.7 2.5 2M6 11.5c0 1 1.2 2 2.3 2s2.2-.8 2.2-2" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg></button>
  <span class="toolbar-sep"></span>
  <button data-cmd="h1" title="Titre 1">H1</button>
  <button data-cmd="h2" title="Titre 2">H2</button>
  <button data-cmd="h3" title="Titre 3">H3</button>
  <span class="toolbar-sep"></span>
  <button data-cmd="ul" title="Liste à puces"><svg viewBox="0 0 16 16" width="14" height="14"><circle cx="2.5" cy="4" r="1.1" fill="currentColor"/><circle cx="2.5" cy="8" r="1.1" fill="currentColor"/><circle cx="2.5" cy="12" r="1.1" fill="currentColor"/><path d="M6 4h8M6 8h8M6 12h8" stroke="currentColor" stroke-width="1.4"/></svg></button>
  <button data-cmd="ol" title="Liste numérotée"><svg viewBox="0 0 16 16" width="14" height="14"><text x="0" y="5.5" font-size="5" fill="currentColor">1</text><text x="0" y="9.5" font-size="5" fill="currentColor">2</text><text x="0" y="13.5" font-size="5" fill="currentColor">3</text><path d="M6 4h8M6 8h8M6 12h8" stroke="currentColor" stroke-width="1.4"/></svg></button>
  <button data-cmd="task" title="Liste de tâches"><svg viewBox="0 0 16 16" width="14" height="14"><rect x="1.5" y="2.5" width="4" height="4" rx="0.5" fill="none" stroke="currentColor" stroke-width="1.3"/><path d="M2.4 4.5l1 1 1.8-2" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round"/><path d="M8 4h6M8 8h6M8 12h6M1.5 8h4M1.5 12h4" stroke="currentColor" stroke-width="1.3"/></svg></button>
  <button data-cmd="quote" title="Citation"><svg viewBox="0 0 16 16" width="14" height="14"><path d="M2 8V4h3v4H2zm5 0V4h3v4H7z" fill="none" stroke="currentColor" stroke-width="1.4"/></svg></button>
  <span class="toolbar-sep"></span>
  <button data-cmd="code" title="Code inline"><svg viewBox="0 0 16 16" width="14" height="14"><path d="M5.5 3L1.5 8l4 5M10.5 3l4 5-4 5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
  <button data-cmd="codeblock" title="Bloc de code"><svg viewBox="0 0 16 16" width="14" height="14"><rect x="1.5" y="2.5" width="13" height="11" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.3"/><path d="M5.5 6L3.5 8l2 2M10.5 6l2 2-2 2" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
  <button data-cmd="link" title="Lien (Ctrl+K)"><svg viewBox="0 0 16 16" width="14" height="14"><path d="M6.5 9.5l3-3M6 4.5L4 6.5a2.5 2.5 0 003.5 3.5L9.5 8M10 11.5L12 9.5a2.5 2.5 0 00-3.5-3.5L6.5 8" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg></button>
  <button data-cmd="image" title="Image (coller/déposer aussi possible)"><svg viewBox="0 0 16 16" width="14" height="14"><rect x="1.5" y="2.5" width="13" height="11" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.3"/><circle cx="5.5" cy="6" r="1.2" fill="currentColor"/><path d="M2 12l4-4 3 3 2.5-2.5L14 12" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg></button>
  <button data-cmd="table" title="Tableau"><svg viewBox="0 0 16 16" width="14" height="14"><rect x="1.5" y="2.5" width="13" height="11" fill="none" stroke="currentColor" stroke-width="1.3"/><path d="M1.5 6.5h13M1.5 10.5h13M6 2.5v11M10.5 2.5v11" stroke="currentColor" stroke-width="1.1"/></svg></button>
  <button data-cmd="hr" title="Séparateur">―</button>
</div>

<main class="workspace" data-mode="split">
  <section class="pane pane-editor">
    <div id="editor-mount" class="editor-mount"></div>
  </section>

  <div class="pane-resizer" id="resizer"></div>

  <section class="pane pane-preview">
    <div id="preview" class="markdown-body"></div>
  </section>
</main>

<footer class="statusbar">
  <span id="word-count">0 mots</span>
  <span id="char-count">0 caractères</span>
  <span id="save-status">Enregistré</span>
</footer>

<!-- Libs (vendorisées en local — aucune dépendance CDN, fonctionne hors-ligne) -->
<script src="js/vendor/markdown-it.min.js"></script>
<script src="js/vendor/purify.min.js"></script>
<script src="js/vendor/highlight.min.js"></script>
<script src="js/vendor/codemirror.min.js"></script>
<script src="js/vendor/pdf-libs.min.js"></script>
<script src="js/vendor/pdfmake.min.js"></script>
<script src="js/vendor/vfs_fonts.js"></script>
<link rel="stylesheet" href="css/vendor/atom-one-dark.min.css">

<!-- App -->
<script src="js/renderer.js"></script>
<script src="js/storage.js"></script>
<script src="js/themes.js"></script>
<script src="js/theme-styles.js"></script>
<script src="js/doc-features.js"></script>
<script src="js/export.js"></script>
<script src="js/export-pdf.js"></script>
<script src="js/export-pdf-vector.js"></script>
<script src="js/export-slides.js"></script>
<script src="js/editor-cm.js"></script>
<script src="js/app.js"></script>

<script>
  // PWA : les service workers exigent https:// ou localhost — ça échoue
  // silencieusement en file:// (double-clic), ce qui est normal et sans impact.
  if ('serviceWorker' in navigator && location.protocol !== 'file:') {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch((err) => {
        console.warn('Service worker non enregistré :', err.message);
      });
    });
  }
</script>
</body>
</html>
